name: Deploy Node.js App to cPanel

on:
  push:
    branches:
      - main  # Only deploy when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches your cPanel Node version

      - name: Install Dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Path on your cPanel server (Application Root)
          server-dir: /template/ 
          # Files to EXCLUDE from upload (node_modules is installed on server)
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
            src/**
            tsconfig.json